default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: quick_development

test:
  <<: *default
  database: quick_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>

  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>

  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
